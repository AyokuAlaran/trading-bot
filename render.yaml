services:
  - type: web
    name: trading-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: POLYMARKET_API_KEY
        sync: false
      - key: POLYMARKET_SECRET
        sync: false
      - key: POLYMARKET_PASSPHRASE
        sync: false
      - key: POLYMARKET_PRIVATE_KEY
        sync: false
      - key: POLYMARKET_FUNDER
        sync: false
      - key: USE_LIVE_MARKETS
        value: "true"
      - key: ANALYTICAL_BOT_INTERVAL_MINUTES
        value: "10"
      - key: SNIPER_POLL_INTERVAL_SECONDS
        value: "15"
      - key: ANALYTICAL_MAX_BET_PCT
        value: "0.20"
      - key: SNIPER_MAX_BET_PCT
        value: "0.20"
